name: Update AI News Daily

on:
  workflow_dispatch:
  schedule:
    # 07:17 Europe/Madrid. En UTC es aprox 05:17 o 06:17 (pero usamos el cron literal solicitado)
    - cron: "17 7 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch daily AI news
        run: node scripts/fetch-ai-news.mjs

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Run build validation
        run: npm run build

      - name: Check for changes and commit
        run: |
          git config --global user.name "Free AI Radar Bot"
          git config --global user.email "actions@github.com"
          
          # Verificar si hay cambios en los archivos de datos
          git add src/data/news.json public/sitemap.xml
          
          if git diff --cached --quiet; then
            echo "No hay noticias nuevas ni cambios detectados en el sitemap."
          else
            echo "Noticias nuevas detectadas. Confirmando cambios..."
            git commit -m "chore(news): daily AI news update"
            git push
          fi
